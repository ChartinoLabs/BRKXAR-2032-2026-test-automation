    pass_criteria: |-
      * Ensure the parsed response contains a "data" list via "data".
      * For each device type entry in the "device_types" jobfile parameter, ensure a matching entry exists in the parsed data via "data[?type=='<device_type>'] | [0]".
      * For each device type entry in the "device_types" jobfile parameter, ensure the parsed "count" equals the expected count via "data[?type=='<device_type>'] | [0].count".
      * For each device type entry in the "device_types" jobfile parameter, ensure a matching expected status entry exists in "statusList" via "data[?type=='<device_type>'] | [0].statusList[?status=='<status>'] | [0]".
      * For each device type entry in the "device_types" jobfile parameter, ensure the parsed status entry "count" equals the expected status count via "data[?type=='<device_type>'] | [0].statusList[?status=='<status>'] | [0].count".
      * For each critical device type in the "critical_device_types" jobfile parameter, ensure the parsed "normal" status count equals the overall device "count" via "data[?type=='<device_type>'] | [0].statusList[?status=='normal'] | [0].count" and "data[?type=='<device_type>'] | [0].count".
    jobfile_parameters: |-
      device_connectivity_type: ssh
      DUTS:
        <vmanage_name>:
          device_types:
            <device_type>:
              count: <expected_total_count>
              statusList:
                <status>:
                  count: <expected_status_count>
          critical_device_types:
            <device_type>:
              expected_status: normal
    jobfile_parameters_mapping: |-
      DUTS.<name>.device_types.<device_type>.count: data[?type=='<device_type>'] | [0].count
      DUTS.<name>.device_types.<device_type>.statusList.<status>.count: data[?type=='<device_type>'] | [0].statusList[?status=='<status>'] | [0].count
      DUTS.<name>.critical_device_types.<device_type>.expected_status: data[?type=='<device_type>'] | [0].statusList[?status=='normal'] | [0].status
