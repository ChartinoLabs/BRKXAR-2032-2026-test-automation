test_cases:
  - title: '[ACI] Verify APIC Chassis Operational State'
    purpose: |
      * Step 1: Discover all pods in the fabric by querying fabricPod. Extract the pod ID from fabricPod.attributes.id for each discovered pod.
      * Step 2: Discover all APIC controller nodes by querying fabricNode with role='controller'. Extract the pod ID and node ID from fabricNode.attributes.dn (format: topology/pod-{pod_id}/node-{node_id}).
      * Step 3: For each pod/node combination discovered in Steps 1 and 2, query the APIC REST API to retrieve chassis operational state (operSt) for that specific APIC controller. The eqptCh object's 'operSt' attribute indicates the current operational status of the chassis hardware.
      * For a network-ready APIC controller, the operational state must be 'online', indicating the chassis is fully functional and operational.
      * Any other state (such as 'offline', 'failed', or 'unknown') indicates a critical hardware issue that prevents the APIC from participating in the cluster and therefore the test case should fail if any of these are encountered.
    labels:
      - GenAI
      - ready-for-script-creation
    commands:
      - command: node/class/fabricPod.json
        preferred_dut: APIC
        api: true
        command_output: |2-
            {
            "totalCount": "2",
            "imdata": [
              {
                "fabricPod": {
                  "attributes": {
                    "childAction": "",
                    "dn": "topology/pod-0",
                    "id": "0",
                    "lcOwn": "local",
                    "modTs": "2025-06-16T23:32:57.811-04:00",
                    "monPolDn": "uni/fabric/monfab-default",
                    "podType": "physical",
                    "status": ""
                  }
                }
              },
              {
                "fabricPod": {
                  "attributes": {
                    "childAction": "",
                    "dn": "topology/pod-1",
                    "id": "1",
                    "lcOwn": "local",
                    "modTs": "2025-06-16T23:37:36.213-04:00",
                    "monPolDn": "uni/fabric/monfab-default",
                    "podType": "physical",
                    "status": ""
                  }
                }
              }
            ]
            }
        parsed_output: |2-
            {
            "totalCount": "2",
            "imdata": [
              {
                "fabricPod": {
                  "attributes": {
                    "childAction": "",
                    "dn": "topology/pod-0",
                    "id": "0",
                    "lcOwn": "local",
                    "modTs": "2025-06-16T23:32:57.811-04:00",
                    "monPolDn": "uni/fabric/monfab-default",
                    "podType": "physical",
                    "status": ""
                  }
                }
              },
              {
