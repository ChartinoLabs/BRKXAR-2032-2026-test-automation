    pass_criteria: |-
      * For each VRF in the jobfile parameters, ensure the VRF exists in the parsed data at "vrf.<vrf_name>".
      * For each VRF, address-family, instance, area, and interface specified in the jobfile parameters, ensure the interface exists in the parsed data at "vrf.<vrf_name>.address_family.<address_family>.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>".
      * For each interface specified in the jobfile parameters, ensure the parsed OSPF interface state at "vrf.<vrf_name>.address_family.<address_family>.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>.state" equals the expected "state" value from the jobfile parameters.
    jobfile_parameters: |-
      device_connectivity_type: ssh
      DUTS:
        <dut_name>:
          vrf:
            <vrf_name>:
              address_family:
                ipv4:
                  instance:
                    <instance_id>:
                      areas:
                        <area_id>:
                          interfaces:
                            <interface_name>:
                              state: <expected_ospf_interface_state>
    jobfile_parameters_mapping: 'DUTS.<name>.vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>.state: vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>.state'
