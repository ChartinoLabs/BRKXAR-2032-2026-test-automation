                    "monPolDn": "uni/fabric/monfab-default",
                    "podType": "physical",
                    "status": ""
                  }
                }
              }
            ]
            }
        parser_used: YamlPathParse
        output_from_device: APIC
      - command: node/class/fabricNode.json?query-target-filter=eq(fabricNode.role,"controller")
        preferred_dut: APIC
        api: true
        command_output: |2-
            {
            "totalCount": "1",
            "imdata": [
              {
                "fabricNode": {
                  "attributes": {
                    "adSt": "on",
                    "address": "192.0.2.10",
                    "annotation": "",
                    "apicType": "apic",
