      * For each VRF in the jobfile parameters, ensure the VRF exists in the parsed data via "vrf.<vrf_name>".
      * For each VRF in the jobfile parameters, ensure the IPv4 address-family OSPF instance exists via "vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>".
      * For each VRF/instance/area in the jobfile parameters, ensure the area exists via "vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>".
      * For each VRF/instance/area/interface in the jobfile parameters, ensure the interface exists via "vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>".
      * For each VRF/instance/area/interface in the jobfile parameters, ensure "vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>.ti_lfa_protected" equals the expected boolean value from the jobfile parameters.
    jobfile_parameters: |-
      device_connectivity_type: ssh
      DUTS:
        <dut_name>:
          vrf:
            <vrf_name>:
              address_family:
                ipv4:
                  instance:
                    "<instance_id>":
                      areas:
                        "<area_id>":
                          interfaces:
                            <interface_name>:
                              ti_lfa_protected: <expected_boolean>
    jobfile_parameters_mapping: 'DUTS.<name>.vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>.ti_lfa_protected: vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>.ti_lfa_protected'
