  - title: '[IOS-XE] Verify SSH Server Operational Status'
    purpose: |
      * Verify that the SSH status is `enabled` (`Enabled`).
    labels:
      - GenAI
      - ready-for-script-creation
    commands:
      - command: show ip ssh | sec Enabled
        api: false
        command_output: '  SSH Enabled - version 2.0'
        parsed_output: |-
          [
            {
              "ssh_status": "Enabled",
              "ssh_version": "2.0"
            }
          ]
        parser_used: Regex
        output_from_device: iosxe-r1
        genai_regex_pattern: (?m)^\\s*SSH\\s+(?P<ssh_status>Enabled|Disabled)\\s*-\\s*version\\s+(?P<ssh_version>\\d+(?:\\.\\d+)*)\\s*$
    pass_criteria: '* Ensure that each entry in the parsed data list at "<parsed_data>[<index>].ssh_status" is equal to the expected "ssh_status" value defined in the jobfile parameters at "DUTS.<name>.ssh.<entry>.ssh_status".'
    jobfile_parameters: |-
      device_connectivity_type: ssh
      DUTS:
        <name>:
          ssh:
            "<entry>":
              ssh_status: <expected_ssh_status>
    jobfile_parameters_mapping: 'DUTS.<name>.ssh.<entry>.ssh_status: "[<entry>].ssh_status"'
