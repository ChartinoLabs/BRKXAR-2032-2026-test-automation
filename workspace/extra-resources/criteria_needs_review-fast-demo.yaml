    pass_criteria: |-
      * For each VRF in the jobfile parameters, ensure the VRF exists in the parsed data via "vrf.<vrf_name>".
      * For each VRF and OSPF instance in the jobfile parameters, ensure the instance exists in the parsed data via "vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>".
      * For each VRF, instance, and area in the jobfile parameters, ensure the area exists in the parsed data via "vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>".
      * For each VRF, instance, area, and interface in the jobfile parameters, ensure the interface exists in the parsed data via "vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>".
      * For each VRF, instance, area, and interface in the jobfile parameters, ensure "last_flood_scan_time_msec" in the parsed data equals the expected integer value from the jobfile parameters via "vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>.last_flood_scan_time_msec".
    jobfile_parameters: |-
      device_connectivity_type: ssh
      DUTS:
        <dut_name>:
          vrf:
            <vrf_name>:
              address_family:
                ipv4:
                  instance:
                    "<instance_id>":
                      areas:
                        <area_id>:
                          interfaces:
                            <interface_name>:
                              last_flood_scan_time_msec: <expected_last_flood_scan_time_msec>
    jobfile_parameters_mapping: |-
      DUTS.<name>.vrf.<vrf_name>: vrf.<vrf_name>
      DUTS.<name>.vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>: vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>
      DUTS.<name>.vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>: vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>
      DUTS.<name>.vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>: vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>
      DUTS.<name>.vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>.last_flood_scan_time_msec: vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>.last_flood_scan_time_msec
