    pass_criteria: '* Ensure that the global OSPF traffic last-clear value in the parsed data at "ospf_statistics.last_clear_traffic_counters" equals the expected "last_clear_traffic_counters" value from the jobfile parameters at "DUTS.<name>.ospf_statistics.last_clear_traffic_counters".'
    jobfile_parameters: |-
      device_connectivity_type: ssh
      DUTS:
        <name>:
          ospf_statistics:
            last_clear_traffic_counters: <expected_last_clear_traffic_counters>
    jobfile_parameters_mapping: 'DUTS.<name>.ospf_statistics.last_clear_traffic_counters: ospf_statistics.last_clear_traffic_counters'
