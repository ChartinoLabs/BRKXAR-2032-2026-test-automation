    pass_criteria: |-
      * For each VRF in the jobfile parameters, ensure the VRF exists in the parsed data via "vrf.<vrf_name>".
      * For each VRF, for each IPv4 OSPF instance in the jobfile parameters, ensure the instance exists in the parsed data via "vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>".
      * For each VRF and instance, for each OSPF area in the jobfile parameters, ensure the area exists in the parsed data via "vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>".
      * For each VRF, instance, and area, for each interface in the jobfile parameters, ensure the interface exists in the parsed data via "vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>".
      * For each VRF, instance, area, and interface in the jobfile parameters, ensure "ipfrr_protected" in the parsed data equals the expected boolean value from the jobfile parameters via "vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>.ipfrr_protected".
    jobfile_parameters: |-
      device_connectivity_type: ssh
      DUTS:
        <dut_name>:
          vrf:
            <vrf_name>:
              address_family:
                ipv4:
                  instance:
                    <instance_id>:
                      areas:
                        <area_id>:
                          interfaces:
                            <interface_name>:
                              ipfrr_protected: <expected_ipfrr_protected_boolean>
    jobfile_parameters_mapping: |-
      DUTS.<name>.vrf.<vrf_name>: vrf.<vrf_name>
      DUTS.<name>.vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>: vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>
      DUTS.<name>.vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>: vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>
      DUTS.<name>.vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>: vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>
      DUTS.<name>.vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>.ipfrr_protected: vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>.ipfrr_protected
