    pass_criteria: |-
      * For each VRF in the jobfile parameters, ensure the VRF exists in the parsed data via "vrf.<vrf_name>".
      * For each VRF, address-family, OSPF instance, area, and interface in the jobfile parameters, ensure the interface exists in the parsed data via "vrf.<vrf_name>.address_family.<af>.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>".
      * For each VRF, address-family, OSPF instance, area, and interface in the jobfile parameters, ensure "vrf.<vrf_name>.address_family.<af>.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>.dead_interval" equals the expected "dead_interval" integer from the jobfile parameters.
    jobfile_parameters: |-
      device_connectivity_type: ssh
      DUTS:
        <dut_name>:
          vrf:
            <vrf_name>:
              address_family:
                <af>:
                  instance:
                    <instance_id>:
                      areas:
                        <area_id>:
                          interfaces:
                            <interface_name>:
                              dead_interval: <expected_dead_interval>
    jobfile_parameters_mapping: |-
      DUTS.<name>.vrf.<vrf_name>: vrf.<vrf_name>
      DUTS.<name>.vrf.<vrf_name>.address_family.<af>: vrf.<vrf_name>.address_family.<af>
      DUTS.<name>.vrf.<vrf_name>.address_family.<af>.instance.<instance_id>: vrf.<vrf_name>.address_family.<af>.instance.<instance_id>
      DUTS.<name>.vrf.<vrf_name>.address_family.<af>.instance.<instance_id>.areas.<area_id>: vrf.<vrf_name>.address_family.<af>.instance.<instance_id>.areas.<area_id>
      DUTS.<name>.vrf.<vrf_name>.address_family.<af>.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>: vrf.<vrf_name>.address_family.<af>.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>
      DUTS.<name>.vrf.<vrf_name>.address_family.<af>.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>.dead_interval: vrf.<vrf_name>.address_family.<af>.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>.dead_interval
