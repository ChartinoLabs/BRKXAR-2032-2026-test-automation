    pass_criteria: |-
      * For each VRF in the jobfile parameters, ensure the VRF exists in the parsed data at "vrf.<vrf_name>".
      * For each VRF in the jobfile parameters, ensure the IPv4 OSPF address-family exists at "vrf.<vrf_name>.address_family.ipv4".
      * For each VRF and OSPF instance in the jobfile parameters, ensure the instance exists at "vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>".
      * For each VRF, instance, and area in the jobfile parameters, ensure the area exists at "vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>".
      * For each VRF, instance, area, and interface in the jobfile parameters, ensure the interface exists at "vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>".
      * For each VRF, instance, area, and interface in the jobfile parameters, ensure "vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>.transmit_delay" equals the expected "transmit_delay" integer from the jobfile parameters.
    jobfile_parameters: |-
      device_connectivity_type: ssh
      DUTS:
        <dut_name>:
          vrf:
            <vrf_name>:
              address_family:
                ipv4:
                  instance:
                    <instance_id>:
                      areas:
                        <area_id>:
                          interfaces:
                            <interface_name>:
                              transmit_delay: <expected_transmit_delay_integer>
    jobfile_parameters_mapping: |-
      DUTS.<name>.vrf.<vrf_name>: vrf.<vrf_name>
      DUTS.<name>.vrf.<vrf_name>.address_family.ipv4: vrf.<vrf_name>.address_family.ipv4
      DUTS.<name>.vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>: vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>
      DUTS.<name>.vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>: vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>
      DUTS.<name>.vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>: vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>
      DUTS.<name>.vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>.transmit_delay: vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>.transmit_delay
