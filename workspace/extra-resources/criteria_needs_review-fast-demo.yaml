    pass_criteria: '* Ensure that the global OSPF received Hello counter in the parsed data at "ospf_statistics.rcvd.hello" is equal to the expected "ospf_statistics.rcvd.hello" value from the jobfile parameters.'
    jobfile_parameters: |-
      device_connectivity_type: ssh
      DUTS:
        <name>:
          ospf_statistics:
            rcvd:
              hello: <expected_rcvd_hello>
    jobfile_parameters_mapping: 'DUTS.<name>.ospf_statistics.rcvd.hello: ospf_statistics.rcvd.hello'
