    pass_criteria: |-
      * For each VRF in the jobfile parameters, ensure the VRF exists in the parsed data at "vrf.<vrf_name>".
      * For each VRF and OSPF IPv4 instance in the jobfile parameters, ensure the instance exists in the parsed data at "vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>".
      * For each VRF, instance, and area in the jobfile parameters, ensure the area exists in the parsed data at "vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>".
      * For each VRF, instance, area, and interface in the jobfile parameters, ensure the interface exists in the parsed data at "vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>".
      * For each VRF, instance, area, and interface in the jobfile parameters, ensure "vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>.statistics.adj_nbr_count" equals the expected integer value from the jobfile parameters.
    jobfile_parameters: |-
      device_connectivity_type: ssh
      DUTS:
        <dut_name>:
          vrf:
            <vrf_name>:
              address_family:
                ipv4:
                  instance:
                    <instance_id>:
                      areas:
                        <area_id>:
                          interfaces:
                            <interface_name>:
                              statistics:
                                adj_nbr_count: <expected_adjacent_neighbor_count_integer>
    jobfile_parameters_mapping: |-
      DUTS.<name>.vrf.<vrf_name>: vrf.<vrf_name>
      DUTS.<name>.vrf.<vrf_name>.address_family.ipv4: vrf.<vrf_name>.address_family.ipv4
      DUTS.<name>.vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>: vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>
      DUTS.<name>.vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>: vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>
      DUTS.<name>.vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>: vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>
      DUTS.<name>.vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>.statistics.adj_nbr_count: vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>.statistics.adj_nbr_count
