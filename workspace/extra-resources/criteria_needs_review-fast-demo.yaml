    pass_criteria: |-
      * For each VRF in the jobfile parameters, ensure the VRF exists in the parsed data via "vrf.<vrf_name>".
      * For each VRF, address-family, OSPF instance, area, interface, and topology specified in the jobfile parameters, ensure the topology entry exists in the parsed data via "vrf.<vrf_name>.address_family.<address_family>.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>.topology.<topology_id>".
      * For each VRF, address-family, OSPF instance, area, interface, and topology specified in the jobfile parameters, ensure "disabled" at "vrf.<vrf_name>.address_family.<address_family>.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>.topology.<topology_id>.disabled" equals the expected boolean value from the jobfile parameters.
    jobfile_parameters: |-
      device_connectivity_type: ssh
      DUTS:
        <dut_name>:
          vrf:
            <vrf_name>:
              address_family:
                <address_family>:
                  instance:
                    <instance_id>:
                      areas:
                        <area_id>:
                          interfaces:
                            <interface_name>:
                              topology:
                                <topology_id>:
                                  disabled: <expected_disabled_boolean>
    jobfile_parameters_mapping: |-
      DUTS.<name>.vrf.<vrf_name>: vrf.<vrf_name>
      DUTS.<name>.vrf.<vrf_name>.address_family.<address_family>: vrf.<vrf_name>.address_family.<address_family>
      DUTS.<name>.vrf.<vrf_name>.address_family.<address_family>.instance.<instance_id>: vrf.<vrf_name>.address_family.<address_family>.instance.<instance_id>
      DUTS.<name>.vrf.<vrf_name>.address_family.<address_family>.instance.<instance_id>.areas.<area_id>: vrf.<vrf_name>.address_family.<address_family>.instance.<instance_id>.areas.<area_id>
      DUTS.<name>.vrf.<vrf_name>.address_family.<address_family>.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>: vrf.<vrf_name>.address_family.<address_family>.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>
      DUTS.<name>.vrf.<vrf_name>.address_family.<address_family>.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>.topology.<topology_id>: vrf.<vrf_name>.address_family.<address_family>.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>.topology.<topology_id>
      DUTS.<name>.vrf.<vrf_name>.address_family.<address_family>.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>.topology.<topology_id>.disabled: vrf.<vrf_name>.address_family.<address_family>.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>.topology.<topology_id>.disabled
