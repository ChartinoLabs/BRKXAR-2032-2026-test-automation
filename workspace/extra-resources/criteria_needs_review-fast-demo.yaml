  - title: '[IOS-XR] Verify Platform Node Name'
    purpose: |
      Verify the platform node for each slot of each slot type on the device. This test case should validate that the node name as seen under slot.<slot_type>.<slot_id>.name is equal to the expected node name in the jobfile parameters.
    labels:
      - GenAI
      - ready-for-script-creation
    commands:
      - command: show platform
        api: false
        command_output: |2-
            Node              Type                       State             Config state
            --------------------------------------------------------------------------------
            0/0/CPU0          R-IOSXRV9000-LC-C          IOS XR RUN        NSHUT
