    pass_criteria: |-
      * For each VRF in the jobfile parameters, ensure the VRF exists in the parsed data via "vrf.<vrf_name>".
      * For each VRF and OSPF IPv4 instance in the jobfile parameters, ensure the instance exists in the parsed data via "vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>".
      * For each VRF, instance, and area in the jobfile parameters, ensure the area exists in the parsed data via "vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>".
      * For each VRF, instance, area, and interface in the jobfile parameters, ensure the interface exists in the parsed data via "vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>".
      * For each VRF, instance, area, and interface in the jobfile parameters, ensure "vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>.cost" equals the expected "cost" value from the jobfile parameters.
    jobfile_parameters: |-
      device_connectivity_type: ssh
      DUTS:
        <dut_name>:
          vrf:
            <vrf_name>:
              address_family:
                ipv4:
                  instance:
                    "<instance_id>":
                      areas:
                        <area_id>:
                          interfaces:
                            <interface_name>:
                              cost: <expected_cost>
    jobfile_parameters_mapping: 'DUTS.<name>.vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>.cost: vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.areas.<area_id>.interfaces.<interface_name>.cost'
