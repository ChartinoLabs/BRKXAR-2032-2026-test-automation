      - command: node/class/eqptCh.json?query-target-filter=wcard(eqptCh.dn,"topology/pod-1/node-1/")
        preferred_dut: APIC
        api: true
        command_output: |2-
            {
            "totalCount": "0",
            "imdata": []
            }
        parsed_output: |2-
            {
            "totalCount": "0",
            "imdata": []
            }
        parser_used: YamlPathParse
        output_from_device: APIC
    pass_criteria: |-
      * Ensure that each discovered pod ID in "fabricPod.imdata[*].fabricPod.attributes.id" is used to build the set of pod identifiers to validate.
      * Ensure that each discovered controller node has a "dn" in "fabricNode.imdata[*].fabricNode.attributes.dn" that can be parsed into a pod ID and node ID.
      * For each controller discovered in "fabricNode.imdata[*].fabricNode.attributes.dn", ensure that the corresponding chassis object exists in "eqptCh.imdata[*].eqptCh" when queried for that pod/node.
      * For each chassis object in "eqptCh.imdata[*].eqptCh.attributes", ensure the "operSt" attribute is equal to the expected operational state from the jobfile parameters via "eqptCh.imdata[*].eqptCh.attributes.operSt".
    jobfile_parameters: |-
      device_connectivity_type: ssh
      DUTS:
        <DUT_name>:
          fabricPod:
            <pod_id>:
              fabricNode:
                <node_id>:
                  eqptCh:
                    operSt: online
    jobfile_parameters_mapping: |-
      DUTS.<name>.fabricPod.<pod_id>: fabricPod.imdata[?fabricPod.attributes.id=='<pod_id>'].fabricPod.attributes.id | [0]
      DUTS.<name>.fabricPod.<pod_id>.fabricNode.<node_id>: fabricNode.imdata[?fabricNode.attributes.dn=='topology/pod-<pod_id>/node-<node_id>'].fabricNode.attributes.dn | [0]
      DUTS.<name>.fabricPod.<pod_id>.fabricNode.<node_id>.eqptCh.operSt: eqptCh.imdata[0].eqptCh.attributes.operSt
