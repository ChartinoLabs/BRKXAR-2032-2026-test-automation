    pass_criteria: |-
      * For each VRF in the jobfile parameters, ensure the VRF exists in the parsed data via "vrf.<vrf_name>".
      * For each VRF and OSPF instance in the jobfile parameters, ensure the instance exists in the parsed data via "vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>".
      * For each VRF and OSPF instance in the jobfile parameters, ensure "vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.total_areas_transit_capable" equals the expected "total_areas_transit_capable" jobfile parameter value.
    jobfile_parameters: |-
      device_connectivity_type: ssh
      DUTS:
        <name>:
          vrf:
            <vrf_name>:
              address_family:
                ipv4:
                  instance:
                    "<instance_id>":
                      total_areas_transit_capable: <expected_total_areas_transit_capable>
    jobfile_parameters_mapping: |-
      DUTS.<name>.vrf.<vrf_name>: vrf.<vrf_name>
      DUTS.<name>.vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>: vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>
      DUTS.<name>.vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.total_areas_transit_capable: vrf.<vrf_name>.address_family.ipv4.instance.<instance_id>.total_areas_transit_capable
