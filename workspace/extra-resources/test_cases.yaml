test_cases:
  - title: '[IOS-XE] Verify SSH Server Operational Status'
    purpose: |
      * Verify that the SSH status is `enabled` (`Enabled`).
    labels: []
    commands:
      - command: show ip ssh | sec Enabled
  - title: '[SDWAN-MANAGER] Verify vManage Device Status'
    purpose: |
      * Query the vManage controller to retrieve the status of all managed devices in the SD-WAN fabric.
      * For each device in the response, verify that the "reachability" attribute is "reachable" and the "status" attribute is "normal".
      * Validate that critical devices (vEdge routers, vSmart controllers, vBond orchestrators) are in the expected operational state.
      * Any device showing "unreachable" or status other than "normal" should trigger test failure.
    labels: []
    commands:
      - command: /dataservice/device/status
        api: true
        preferred_dut: VMANAGE
  - title: '[IOS-XE] Verify EIGRP Neighbor Adjacencies'
    purpose: |
      The purpose of this test case is to verify the EIGRP Neighbor Adjacencies on the device. The eigrp instance > vrf > address_family > eigrp_interface > eigrp_nbr IP attribute (no other attributes) should match the expected values from the jobfile parameters.
    labels: []
    commands:
      - command: show vrf
      - command: show ip eigrp vrf RED neighbors
  - title: '[DNAC] Verify DNAC Network Devices List'
    purpose: |
      * For every device in the response, verify that the `managementState` is `Managed`.
    labels: []
    commands:
      - command: /dna/intent/api/v1/network-device
        api: true
  - title: '[ACI] Verify APIC Chassis Operational State'
    purpose: |
      * Step 1: Discover all pods in the fabric by querying fabricPod. Extract the pod ID from fabricPod.attributes.id for each discovered pod.
      * Step 2: Discover all APIC controller nodes by querying fabricNode with role='controller'. Extract the pod ID and node ID from fabricNode.attributes.dn (format: topology/pod-{pod_id}/node-{node_id}).
      * Step 3: For each pod/node combination discovered in Steps 1 and 2, query the APIC REST API to retrieve chassis operational state (operSt) for that specific APIC controller. The eqptCh object's 'operSt' attribute indicates the current operational status of the chassis hardware.
      * For a network-ready APIC controller, the operational state must be 'online', indicating the chassis is fully functional and operational.
      * Any other state (such as 'offline', 'failed', or 'unknown') indicates a critical hardware issue that prevents the APIC from participating in the cluster and therefore the test case should fail if any of these are encountered.
    labels: []
    commands:
      - command: node/class/fabricPod.json
        preferred_dut: REAL-APIC
        api: true
      - command: node/class/fabricNode.json?query-target-filter=eq(fabricNode.role,"controller")
        preferred_dut: REAL-APIC
        api: true
      - command: node/class/eqptCh.json?query-target-filter=wcard(eqptCh.dn,"topology/pod-1/node-1/")
        preferred_dut: REAL-APIC
        api: true
  - title: '[NX-OS] Verify VLAN Name'
    purpose: This test case validates that the VLAN Name (vlanshowbr-vlanname) tied to any given VLAN ID ((vlanshowbr-vlanid)), is as expected, assuming the VLAN was named.
    labels: []
    commands:
      - command: show vlan brief
  - title: '[IOS-XR] Verify IS-IS Interface Circuit Type'
    purpose: The goal of this test case is to verify the IS-IS Interface Circuit Type on the device. The parsed data values for the interface and its circuit type should match the expected values from the learned parameters (Gather Parameters keyword) in the 'DUTS' dictionary that adhere to the schema provided.
    labels: []
    commands:
      - command: show isis interface
  - title: '[IOS-XR] Verify IS-IS Interface Circuit Type'
    purpose: The goal of this test case is to verify the IS-IS Interface Circuit Type on the device. The parsed data values for the interface and its circuit type should match the expected values from the learned parameters (Gather Parameters keyword) in the 'DUTS' dictionary that adhere to the schema provided.
    labels: []
    commands:
      - command: show isis interface
  - title: '[IOS-XR] Verify VRF IPv4 Interfaces'
    purpose: The goal of this test case is to verify the VRF IPv4 Interfaces on the device. The parsed data values for the interface and its circuit type should match the expected values from the learned parameters (Gather Parameters keyword) in the 'DUTS' dictionary that adhere to the schema provided.
    labels: []
    commands:
      - command: show vrf all
      - command: show ipv4 vrf RED interface
  - title: '[ISE] Verify ISE Network Devices Description'
    purpose: Run the API request to get a list of network devices. For every network device in the parsed JSON data, denoted by "name" collect the device_id denoted by the "id" attribute in the parsed JSON data. Run the API request with the device_id appended to the endpoint and analyze the parsed JSON data. Verify that the "NetworkDevice.description" attribute in the parsed JSON data is equal to the DUT's expected jobfile parameters.
    labels: []
    commands:
      - command: /ers/config/networkdevice
        preferred_dut: ISE-SANDBOX
        api: true
  - title: '[DNAC] Verify DNAC Network Devices List'
    purpose: For every device in the response, verify that the device's serialNumber matches the expected serialNumber for that device (use the hostname as the device_name). If the serialNumber does not match the expected serialNumber, the test case should fail.
    labels: []
    commands:
      - command: /dna/intent/api/v1/network-device
        preferred_dut: BIMC-DNAC
        api: true
  - title: '[IOS-XR] Verify Platform Node Name'
    purpose: |
      Verify the platform node for each slot of each slot type on the device. This test case should validate that the node name as seen under slot.<slot_type>.<slot_id>.name is equal to the expected node name in the jobfile parameters.
    commands:
      - command: show platform
  - title: '[CatC] Verify Catalyst Center Network Devices List'
    purpose: For every device in the response, verify that the device's serialNumber matches the expected serialNumber for that device (use the hostname as the device_name). If the serialNumber does not match the expected serialNumber, the test case should fail.
    labels: []
