  - title: '[IOS-XE] Verify Running Config Execution'
    purpose: |
      * Verify that the command executes successfully on the device.
      * The command should produce either empty or valid output without errors.
      * No attribute-level validation — configuration display commands show intent,
        not operational state. The Genie parser produces a flat dict where every key
        is a full CLI config line with empty {} values — zero testable leaf attributes.
      * No parameters should be learned for this test case since it is execution only.
    labels: []
    commands:
      - command: show running-config
