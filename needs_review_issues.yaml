  - new-test-case
  - GenAI
  - Criteria-Ready-For-SME-Review
  commands:
  - command: show vrf
    command_output: |-
      VRF-Name                           VRF-ID State   Reason                        
      RED                                     4 Up      --                            
      default                                 1 Up      --                            
      egress-loadbalance-resolution-          3 Up      --                            
      management                              2 Up      --
    parsed_output: |-
      {
        "vrfs": {
          "RED": {
            "vrf_id": 4,
            "vrf_state": "Up",
            "reason": "--"
