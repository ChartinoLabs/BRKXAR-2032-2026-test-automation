---
issues:
- title: '[IOS-XE] Verify EIGRP Neighbor Adjacencies'
  purpose: |
    * The purpose of this test case is to verify the EIGRP Neighbor Adjacencies on the device. 
    * The eigrp instance > vrf > address_family > eigrp_interface > eigrp_nbr IP attribute (no other attributes) should match the expected values from the jobfile parameters.
  labels:
  - new-test-case
  - GenAI
  - Criteria-Ready-For-SME-Review
  commands:
  - command: show vrf
    command_output: |2-
        Name                             Default RD            Protocols   Interfaces
        RED                              65001:202             ipv4        Lo200
                                                                           Lo201
                                                                           Lo202
                                                                           Lo203
                                                                           Gi4
                                                                           Gi4.201
                                                                           Gi4.202
                                                                           Gi4.203
                                                                           Gi2.200
                                                                           Gi2.201
                                                                           Gi2.202
                                                                           Gi2.203
        management                       <not set>             ipv4        Gi5
    parsed_output: |-
      {
        "vrf": {
          "RED": {
            "route_distinguisher": "65001:202",
            "protocols": [
              "ipv4"
            ],
            "interfaces": [
              "GigabitEthernet2.200",
              "GigabitEthernet2.201",
              "GigabitEthernet2.202",
              "GigabitEthernet2.203",
              "GigabitEthernet4",
              "GigabitEthernet4.201",
              "GigabitEthernet4.202",
              "GigabitEthernet4.203",
              "Loopback200",
              "Loopback201",
              "Loopback202",
              "Loopback203"
            ]
          },
          "management": {
            "route_distinguisher": "<not set>",
            "protocols": [
              "ipv4"
            ],
            "interfaces": [
              "GigabitEthernet5"
            ]
          }
        }
      }
    parser_used: Genie
    output_from_device: iosxe-r1
  - command: show ip eigrp vrf RED neighbors
    command_output: |-
      EIGRP-IPv4 VR(TaC_EIGRP) Address-Family Neighbors for AS(201)
                 VRF(RED)
      H   Address                 Interface              Hold Uptime   SRTT   RTO  Q  Seq
                                                         (sec)         (ms)       Cnt Num
      0   10.201.10.2             Gi4.201                  12 13w0d       4   100  0  78
    parsed_output: |-
      {
        "eigrp_instance": {
          "201": {
            "vrf": {
              "RED": {
                "address_family": {
                  "ipv4": {
                    "name": "TaC_EIGRP",
                    "named_mode": true,
                    "eigrp_interface": {
                      "GigabitEthernet4.201": {
                        "eigrp_nbr": {
                          "10.201.10.2": {
                            "peer_handle": 0,
                            "hold": 12,
                            "uptime": "13w0d",
                            "srtt": 0.004,
                            "rto": 100,
                            "q_cnt": 0,
                            "last_seq_number": 78
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          }
        }
      }
    parser_used: Genie
    output_from_device: iosxe-r1
  pass_criteria: |
    * For each EIGRP instance in the "instance" jobfile parameter, ensure the instance exists in the parsed data via "eigrp_instance.<instance>".
    * For each VRF in "instance.<instance>.vrf", ensure the VRF exists in the parsed data via "eigrp_instance.<instance>.vrf.<vrf_name>".
    * For each address family in "instance.<instance>.vrf.<vrf_name>.address_family", ensure the address family exists in the parsed data via "eigrp_instance.<instance>.vrf.<vrf_name>.address_family.<address_family>".
    * For each interface in "instance.<instance>.vrf.<vrf_name>.address_family.<address_family>.eigrp_interface", ensure the interface exists in the parsed data via "eigrp_instance.<instance>.vrf.<vrf_name>.address_family.<address_family>.eigrp_interface.<interface_name>".
    * For each neighbor IP in "instance.<instance>.vrf.<vrf_name>.address_family.<address_family>.eigrp_interface.<interface_name>.eigrp_nbr", ensure the neighbor IP exists in the parsed data via "eigrp_instance.<instance>.vrf.<vrf_name>.address_family.<address_family>.eigrp_interface.<interface_name>.eigrp_nbr.<neighbor_ip>".
  jobfile_parameters: |
    device_connectivity_type: ssh
    DUTS:
      "<name>":
        instance:
          "<instance>":
            vrf:
              "<vrf_name>":
                address_family:
                  "<address_family>":
                    eigrp_interface:
                      "<interface_name>":
                        eigrp_nbr:
                          "<neighbor_ip>": {}
  jobfile_parameters_mapping: |
    DUTS.<name>.instance.<instance>.vrf.<vrf_name>: eigrp_instance.<instance>.vrf.<vrf_name>
    DUTS.<name>.instance.<instance>.vrf.<vrf_name>.address_family.<address_family>: eigrp_instance.<instance>.vrf.<vrf_name>.address_family.<address_family>
    DUTS.<name>.instance.<instance>.vrf.<vrf_name>.address_family.<address_family>.eigrp_interface.<interface_name>: eigrp_instance.<instance>.vrf.<vrf_name>.address_family.<address_family>.eigrp_interface.<interface_name>
    DUTS.<name>.instance.<instance>.vrf.<vrf_name>.address_family.<address_family>.eigrp_interface.<interface_name>.eigrp_nbr.<neighbor_ip>: eigrp_instance.<instance>.vrf.<vrf_name>.address_family.<address_family>.eigrp_interface.<interface_name>.eigrp_nbr.<neighbor_ip>
  added_to_cxtmyaml: ''
