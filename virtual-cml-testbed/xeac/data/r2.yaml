---
iosxe:
  devices:
    - name: R2
      host: usps-svs-cml-cluster-controller.cisco.com:2397
      managed: true
      protocol: netconf
      configuration:
        system:
          hostname: "R2"
        interfaces:
          ethernets:
            - type: GigabitEthernet
              id: "1"
              description: "Management"
              shutdown: false
            - type: GigabitEthernet
              id: "2"
              description: "R2 to R1"
              shutdown: false
              cdp: true
              ipv4:
                address: "10.0.12.2"
                address_mask: "255.255.255.252"
            - type: GigabitEthernet
              id: "3"
              description: "R2 to R4"
              shutdown: false
              cdp: true
              ipv4:
                address: "10.0.24.1"
                address_mask: "255.255.255.252"
          loopbacks:
            - id: 0
              description: "Router ID"
              shutdown: false
              ipv4:
                address: "192.0.2.2"
                address_mask: "255.255.255.255"
        routing:
          bgp:
            as_number: 65000
            neighbors:
              - ip: "192.0.2.1"
                remote_as: 65000
                update_source_interface_type: Loopback
                update_source_interface_id: 0
              - ip: "192.0.2.3"
                remote_as: 65000
                update_source_interface_type: Loopback
                update_source_interface_id: 0
              - ip: "192.0.2.4"
                remote_as: 65000
                update_source_interface_type: Loopback
                update_source_interface_id: 0
            address_family:
              ipv4_unicast:
                networks:
                  - network: "192.0.2.2"
                    mask: "255.255.255.255"
                neighbors:
                  - ip: "192.0.2.1"
                    activate: true
                  - ip: "192.0.2.3"
                    activate: true
                  - ip: "192.0.2.4"
                    activate: true
          ospf_processes:
            - id: 1
              router_id: "192.0.2.2"
              networks:
                - ip: "192.0.2.2"
                  wildcard: "0.0.0.0"
                  area: 0
                - ip: "10.0.12.0"
                  wildcard: "0.0.0.3"
                  area: 0
                - ip: "10.0.24.0"
                  wildcard: "0.0.0.3"
                  area: 0
