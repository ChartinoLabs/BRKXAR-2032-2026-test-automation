scenarios:
  link-shutdown-r1r2:
    name: R1 to R2 Link Shutdown and Recovery
    phases:
      pre-change:
        name: Pre-Change Baseline
        test_case_groups:
        - baseline
      shutdown:
        name: Shut TAC-R1 GigabitEthernet0/0/1 (R1-R2 link)
        depends_on:
        - pre-change
        test_case_groups:
        - shut
      gate-post-shutdown:
        name: Post-Shutdown Convergence Gate
        depends_on:
        - shutdown
        test_case_groups:
        - gate-post-shutdown
      post-shutdown:
        name: Post-Shutdown Verification
        depends_on:
        - gate-post-shutdown
        test_case_groups:
        - post-shutdown
      normalize:
        name: Normalize TAC-R1 GigabitEthernet0/0/1 (R1-R2 link)
        depends_on:
        - post-shutdown
        test_case_groups:
        - normalize
      gate-post-normalize:
        name: Post-Normalize Convergence Gate
        depends_on:
        - normalize
        test_case_groups:
        - gate-post-normalize
      post-normalize:
        name: Post-Normalize Verification
        depends_on:
        - gate-post-normalize
        test_case_groups:
        - baseline
